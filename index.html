    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/CipherDispatch/sw.js')
            .catch(err => console.log('SW registration failed:', err));
        });
      }

      // GitHub Pages SPA redirect handler
      // 404.html redirects to /?p=/original/path — restore it immediately
      (function() {
        var l = window.location;
        if (l.search) {
          var q = {};
          l.search.slice(1).split('&').forEach(function(v) {
            var a = v.split('=');
            q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
          });
          if (q.p !== undefined && q.p) {
            var restored = l.pathname.slice(0, -1) + q.p + (q.q ? ('?' + q.q) : '') + l.hash;
            history.replaceState(null, null, restored);
          }
        }
      })();
    </script>
